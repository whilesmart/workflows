name: 'Pre-Release Checks'
description: 'Checks if version and changelog are properly configured for JS projects'

inputs:
  token:
    description: 'The GitHub token for authentication'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Configure Git
      shell: bash
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Extract version from package.json
      id: get_version
      shell: bash
      run: |
        if [ ! -f "package.json" ]; then
          echo "::error::package.json not found!"
          exit 1
        fi

        VERSION=$(jq -r '.version // empty' package.json)

        if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
          echo "::error::No version found in package.json!"
          echo "Please add a 'version' field to your package.json file."
          exit 1
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Found version: $VERSION"

    - name: Extract release notes from CHANGELOG.md
      id: get_changelog
      shell: bash
      run: |
        if [ ! -f "CHANGELOG.md" ]; then
          echo "::error::CHANGELOG.md not found!"
          exit 1
        fi

        VERSION="${{ steps.get_version.outputs.version }}"
        TEMP_FILE=$(mktemp)

        awk -v version="$VERSION" '
        BEGIN { found=0; printing=0 }
        /^## \[/ {
          if (found && printing) exit
          if ($0 ~ "\\[" version "\\]") {
            found=1
            printing=1
            next
          }
        }
        found && printing && /^## \[/ { exit }
        found && printing { print }
        ' CHANGELOG.md > "$TEMP_FILE"

        if [ ! -s "$TEMP_FILE" ]; then
          echo "::error::No changelog entry found for version $VERSION!"
          echo "Please add a changelog entry in the format: ## [$VERSION] - YYYY-MM-DD"
          rm "$TEMP_FILE"
          exit 1
        fi

        {
          echo 'release_notes<<EOF'
          cat "$TEMP_FILE"
          echo 'EOF'
        } >> $GITHUB_OUTPUT

        rm "$TEMP_FILE"
        echo "Found changelog entry for version $VERSION"

    - name: Check if tag already exists
      id: check_tag
      shell: bash
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        if git rev-parse "v$VERSION" >/dev/null 2>&1; then
          echo "::error::Tag v$VERSION already exists!"
          echo "Please update the version in package.json before creating a release."
          exit 1
        fi
        echo "Tag v$VERSION does not exist, proceeding..."
