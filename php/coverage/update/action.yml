name: 'Update Code Coverage'
description: 'Updates the baseline code coverage in the repository.'

runs:
  using: "composite"
  steps:
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
      shell: bash

    # Step 1: Read current baseline
    - name: Read current baseline
      id: baseline
      shell: bash
      run: |
        BASELINE_FILE=".github/coverage-baseline.json"
        if [ ! -f "$BASELINE_FILE" ]; then
          mkdir -p .github
          echo '{"coverage":0}' > "$BASELINE_FILE"
        fi
        CURRENT=$(php -r "echo json_decode(file_get_contents('$BASELINE_FILE'), true)['coverage'] ?? 0;")
        echo "current=$CURRENT" >> $GITHUB_OUTPUT

    # Step 2: Try to get coverage from PR comment (same-repo PRs)
    - name: Get Pull Request Number
      id: get_pr_id
      shell: bash
      run: |
        # Use the GITHUB_SHA (the commit that triggered the workflow) to find the associated PR
        PR_NUMBER=$(gh pr list --state merged --search "$GITHUB_SHA" --json number -q '.[0].number')
        echo "PR number is $PR_NUMBER"
        echo "pull_request_number=$PR_NUMBER" >> $GITHUB_OUTPUT
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Find Comment
      uses: peter-evans/find-comment@v4
      id: fc
      with:
        issue-number: ${{ steps.get_pr_id.outputs.pull_request_number }}
        body-includes: Coverage Report

    - name: Get coverage on main if needed
      id: main-coverage
      shell: bash
      run: |
        if [ -n "${{ steps.fc.outputs.comment-body }}" ]; then
          COV=$(echo "${{ steps.fc.outputs.comment-body }}" | grep "PR coverage:" | awk '{print $3}' | tr -d '%')
          echo "coverage=$COV" >> $GITHUB_OUTPUT
        else
          echo "coverage=0" >> $GITHUB_OUTPUT
        fi

    # Step 3: Update baseline if coverage is higher
    - name: Update baseline JSON if higher
      shell: bash
      run: |
        CURRENT=${{ steps.baseline.outputs.current }}
        PR_COVERAGE=${{ steps.main-coverage.outputs.coverage }}
        echo "Current baseline: $CURRENT%"
        echo "New coverage: $PR_COVERAGE%"

        COMP=$(php -r "echo ($PR_COVERAGE > $CURRENT) ? 1 : 0;")
        if [ "$COMP" -eq 1 ]; then
          php .github/scripts/update_coverage.php $PR_COVERAGE
        else
          echo "Baseline already higher. Skipping update."
          exit 0
        fi

    # Step 5: Commit updated baseline if updated
    - name: Commit updated baseline
      shell: bash
      run: |
        PR_COVERAGE=${{ steps.main-coverage.outputs.coverage }}
        git add .github/coverage-baseline.json
        git diff --staged --quiet || git commit -m "enh: Update coverage baseline to $PR_COVERAGE%"
        git push