name: 'Pre-Release Checks'
description: 'Validates Python project readiness before creating a release.'

inputs:
  token:
    description: 'The GitHub token for authentication.'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Validate VERSION file
      shell: bash
      run: |
        if [ ! -f "VERSION" ]; then
          echo "::error::VERSION file not found!"
          exit 1
        fi

        VERSION=$(cat VERSION | tr -d '[:space:]')

        if [ -z "$VERSION" ]; then
          echo "::error::VERSION file is empty!"
          exit 1
        fi

        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
          echo "::error::Invalid version format: $VERSION (expected semver)"
          exit 1
        fi

        echo "Valid version: $VERSION"

    - name: Validate CHANGELOG.md
      shell: bash
      run: |
        if [ ! -f "CHANGELOG.md" ]; then
          echo "::error::CHANGELOG.md not found!"
          exit 1
        fi

        VERSION=$(cat VERSION | tr -d '[:space:]')
        TEMP_FILE=$(mktemp)

        awk -v version="$VERSION" '
        BEGIN { found=0; printing=0 }
        /^## \[/ {
          if (found && printing) exit
          if ($0 ~ "\\[" version "\\]") {
            found=1
            printing=1
            next
          }
        }
        found && printing && /^## \[/ { exit }
        found && printing { print }
        ' CHANGELOG.md > "$TEMP_FILE"

        if [ ! -s "$TEMP_FILE" ]; then
          echo "::error::No changelog entry found for version $VERSION!"
          rm "$TEMP_FILE"
          exit 1
        fi

        rm "$TEMP_FILE"
        echo "Changelog entry found for version $VERSION"

    - name: Check tag does not exist
      shell: bash
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        if git rev-parse "v$VERSION" >/dev/null 2>&1; then
          echo "::error::Tag v$VERSION already exists!"
          exit 1
        fi
        echo "Tag v$VERSION does not exist, proceeding..."

    - name: Summary
      if: success()
      shell: bash
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        echo "## Pre-Release Checks Passed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- VERSION file: \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "- CHANGELOG.md entry: Found" >> $GITHUB_STEP_SUMMARY
        echo "- Tag v$VERSION: Does not exist" >> $GITHUB_STEP_SUMMARY
